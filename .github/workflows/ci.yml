name: CI (test gate + deploy)

# Tests run on every PR and every push to main. The deploy job is GATED on
# both test jobs — `git push origin main` only reaches the VPS if the full
# Vitest + pytest suites are green. Deploy lives in THIS file because GitHub
# Actions `needs:` cannot reference jobs in another workflow file.
on:
  pull_request:
  push:
    branches: [main]

# Cancel superseded runs on the same ref so a rapid push doesn't deploy twice.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web-tests:
    name: Vitest (full config)
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test
      ASSISTANT_MOCK: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      # The repo has TWO bun projects: the root one provides vitest + the
      # cross-cutting vitest.config.ts (which imports `vitest/config`), and
      # web/ provides the app modules the tests import (@/lib, react, ...).
      # Install BOTH or the root config fails to load with ERR_MODULE_NOT_FOUND.
      - run: bun install --frozen-lockfile
      - run: bun install --frozen-lockfile
        working-directory: web
      # Run the FULL vitest config from the repo root (lib/tools + site/lib +
      # web/tests), NOT `bun run test` — that script restricts to web/tests and
      # silently skips ~9 files / ~68 tests (incl. site/lib/theme). vitest + the
      # config resolve from root node_modules; web/tests files resolve their
      # imports from web/node_modules.
      #
      # Exclude the integration tests: these spawn `python3.13` and/or read
      # gitignored data/*.json runtime caches, so they can't run in this
      # Bun-only, data-less unit job (this mirrors pytest's `-m 'not
      # integration'`). They still run locally where Python + data exist.
      - run: >-
          bunx vitest run --config vitest.config.ts
          --exclude '**/web/tests/integration.test.ts'
          --exclude '**/lib/tools/__tests__/kelly.test.ts'
          --exclude '**/lib/tools/__tests__/runner.test.ts'
          --exclude '**/lib/tools/__tests__/data-reader.test.ts'

  py-tests:
    name: pytest (unit, no integration)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r scripts/requirements-api.txt
          pip install pytest pytest-asyncio
      # Run from the repo ROOT — pyproject.toml pins pythonpath so `import
      # ib_sync` / `from api.*` / trade_blotter all resolve. addopts already
      # applies `-m 'not integration'`, so the live MenthorQ suite is skipped.
      - run: python -m pytest scripts/tests scripts/api/tests

  deploy:
    name: Deploy to VPS
    needs: [web-tests, py-tests]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: radon
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd ~/radon-cloud
            bash scripts/deploy.sh
