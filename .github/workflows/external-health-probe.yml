name: Tier-3 external health probe

# OFF-BOX health probe. Runs on GitHub's infra (NOT the Radon tailnet), so it
# survives a whole-box Hetzner outage that would take every on-box observer
# (FastAPI /health, the scripts/health_service daemon) down with it. It GETs the
# public edge — https://app.radon.run/edge-health/{ping,status} — classifies
# reachability, and UPSERTs one row into Turso (off-box) via the libsql HTTP
# API. A dead-man's-switch on external_probe.checked_at (scripts/health_probe/
# reader.py) ensures a DEAD prober reads as 'stale', never as all-green.
#
# It cannot reach Tailscale :8321 / TCP :4001 from here by design — the edge's
# /edge-health/status already aggregates those internal probes.
#
# DUR-16: the probe also walks the unauthenticated user path (/dashboard must
# hit the Clerk wall) and the bearer-auth /api/probe/freshness aggregate, and
# appends one external_probe_runs history row per run. The probe step MUST be
# allowed to fail the job (no `|| true`): probe.py exits nonzero when the edge
# or user path is down (or freshness is explicitly stale during RTH), and
# GitHub's default email on a FAILED workflow run is the operator alert that
# closes the DUR-04 "records the outage but notifies no human" residual.

on:
  # TURSO_DB_URL + TURSO_AUTH_TOKEN repo secrets are configured (verified by a
  # manual smoke run landing a row in external_probe).
  schedule:
    # Every 5 min is GitHub's minimum cron granularity; runs are best-effort
    # and routinely lag 5-15 min under load. The reader's staleness window
    # (20 min) absorbs that jitter without flapping.
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

# Never let two probes overlap; don't cancel an in-flight one (let it finish
# its write) — just queue at most one behind it.
concurrency:
  group: external-health-probe
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  probe:
    name: probe public edge -> Turso
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      # stdlib-only by contract — no pip install, no requirements. If this step
      # ever needs a dependency, the isolation contract has been broken.
      - name: Run Tier-3 probe
        env:
          TURSO_DB_URL: ${{ secrets.TURSO_DB_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
          RADON_PROBE_FRESHNESS_TOKEN: ${{ secrets.RADON_PROBE_FRESHNESS_TOKEN }}
          EXTERNAL_PROBE_SOURCE: github-actions/edge
        # No `|| true` here — a nonzero exit (edge/user-path down, or stale
        # freshness during RTH) must fail the job so GitHub emails the operator.
        run: PYTHONPATH=scripts python -m health_probe.probe
